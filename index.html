<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Success</title>

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            margin: 0;
            overflow-x: hidden;
        }

        .container {
            text-align: center;
            padding-top: 50px;
        }

        .check {
            width: 80px;
            height: 80px;
            background: #1ec773;
            border-radius: 50%;
            margin: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 40px;
        }

        .amount {
            font-size: 36px;
            margin-top: 20px;
        }

        .status {
            color: gray;
            margin-bottom: 20px;
        }

        .details {
            background: white;
            margin: 20px;
            padding: 15px;
            border-radius: 10px;
            text-align: left;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            font-size: 14px;
        }

        .label {
            color: gray;
        }

        .btn {
            position: fixed;
            bottom: 100px;
            left: 20px;
            right: 20px;
            background: #2f80ed;
            color: white;
            text-align: center;
            padding: 15px;
            border-radius: 25px;
            font-size: 18px;
        }

        /* 广告 */
        .ad-container {
            position: fixed;
            bottom: 0;
           width: 100%;
    height: 90px;
    object-fit: contain;
            background: white;
            padding: 5px;
            box-sizing: border-box;
            overflow: hidden;
            box-shadow: 0 -2px 5px rgba(0,0,0,0.1);
        }

        .ad-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;      /* 关键：不会拉伸 */
            border-radius: 10px;
        }

        .close-ad {
            position: absolute;
            right: 10px;
            top: 5px;
            background: rgba(0,0,0,0.6);
            color: white;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            text-align: center;
            line-height: 22px;
            font-size: 12px;
            cursor: pointer;
        }

        /* loading */
        #overlay {
            position: fixed;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
        }

        #popup {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: white;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            width: 220px;
        }

        .loader {
            border: 5px solid #eee;
            border-top: 5px solid #1ec773;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        #mainPage {
            display: none;
        }
    </style>
</head>

<body>

<!-- Loading -->
<div id="overlay">
    <div id="popup">
        <div class="loader"></div>
        <p>Processing Payment...</p>
    </div>
</div>

<!-- 成功页面 -->
<div id="mainPage">
    <div class="container">
        <div class="check">✔</div>
        <div class="amount">RM 100.00</div>
        <div class="status">Transferred</div>

        <div class="details">
            <div class="row"><span class="label">Receiver</span><span>YEAP SHUN ANN</span></div>
            <div class="row"><span class="label">Transaction Type</span><span>DuitNow Transfer</span></div>
            <div class="row"><span class="label">Bank</span><span>CIMB Bank</span></div>
            <div class="row"><span class="label">Account No</span><span>7062849448</span></div>
            <div class="row"><span class="label">Date & Time</span><span id="time"></span></div>
        </div>
    </div>

    <div class="btn">Done</div>

    <!-- 广告 -->
    <div class="ad-container" id="adBox">
        <div class="close-ad" onclick="closeAd()">×</div>
        <img src="seven.jpg" />
    </div>
</div>

<script>
    // 自动时间
    let now = new Date();
    document.getElementById("time").innerText = now.toLocaleString();

    // loading → success
    setTimeout(function() {
        document.getElementById("overlay").style.display = "none";
        document.getElementById("mainPage").style.display = "block";
    }, 2500);

    function closeAd() {
        document.getElementById("adBox").style.display = "none";
    }
</script>

</body>
</html>
